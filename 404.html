<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>404</text></svg>">
  <title>404 - Wenbo Ji</title>
  <style>
    :root {
      --paper: #eef3f8;
      --paper-soft: #fbfcfd;
      --ink: #2f3e4d;
      --body: #44576b;
      --muted: #708295;
      --line: #dbe3ec;
      --line-strong: #c8d3de;
      --link: #2a6fbb;
      --accent: #d9822b;
      --shadow: rgba(15, 23, 42, 0.08);
      --mx: 0;
      --my: 0;
      --rx: 0deg;
      --ry: 0deg;
      --glare-x: 50%;
      --glare-y: 42%;
      --energy: 0;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 16%, rgba(111, 169, 255, 0.22), transparent 31%),
        radial-gradient(circle at 84% 18%, rgba(255, 190, 122, 0.24), transparent 29%),
        radial-gradient(circle at 58% 82%, rgba(153, 241, 214, 0.22), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, #edf3f8 48%, #e8eef5 100%);
      color: var(--body);
      font-family: "Lato", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.46;
      background-image:
        linear-gradient(120deg, transparent 0 42%, rgba(255, 255, 255, 0.5) 46%, transparent 52%),
        repeating-linear-gradient(0deg, rgba(47, 62, 77, 0.025) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.42) 0 1px, transparent 1px 6px);
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto 8vw 6vh auto;
      width: 540px;
      width: min(42vw, 540px);
      height: 540px;
      aspect-ratio: 1;
      z-index: -1;
      pointer-events: none;
      border-radius: 999px;
      background:
        conic-gradient(from 28deg, rgba(83, 136, 255, 0.16), rgba(255, 114, 197, 0.13), rgba(255, 208, 91, 0.15), rgba(69, 214, 188, 0.13), rgba(83, 136, 255, 0.16));
      filter: blur(44px);
      opacity: 0.72;
    }

    a {
      color: var(--link);
      text-decoration: none;
      transition: color 0.18s ease, border-color 0.18s ease, transform 0.18s ease, background-color 0.18s ease;
    }

    a:focus,
    a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--link);
      outline-offset: 3px;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(224, 226, 229, 0.72);
      border-bottom: 1px solid rgba(165, 168, 173, 0.46);
      box-shadow: 0 8px 24px rgba(35, 37, 40, 0.07);
      -webkit-backdrop-filter: saturate(160%) blur(16px);
      backdrop-filter: saturate(160%) blur(16px);
    }

    .navbar-container {
      width: 100%;
      max-width: 1100px;
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 10px 2.5%;
      box-sizing: border-box;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      display: inline-flex;
      align-items: center;
      font-weight: 700;
      font-size: 18px;
      color: var(--link);
    }

    .navbar-brand img {
      display: block;
      width: 148px;
      height: auto;
    }

    .navbar-links {
      display: flex;
      align-items: center;
    }

    .navbar-links a {
      margin-left: 16px;
      color: #4b5563;
      font-weight: 500;
      letter-spacing: 0;
    }

    .navbar a:hover {
      color: var(--accent);
    }

    .navbar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(165, 168, 173, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--ink);
      cursor: pointer;
    }

    .navbar-toggle-lines,
    .navbar-toggle-lines::before,
    .navbar-toggle-lines::after {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .navbar-toggle-lines {
      position: relative;
    }

    .navbar-toggle-lines::before,
    .navbar-toggle-lines::after {
      content: "";
      position: absolute;
      left: 0;
    }

    .navbar-toggle-lines::before {
      top: -6px;
    }

    .navbar-toggle-lines::after {
      top: 6px;
    }

    .navbar.is-open .navbar-toggle-lines {
      display: none;
    }

    .navbar.is-open .navbar-toggle::after {
      content: "\00d7";
      font-size: 34px;
      font-weight: 300;
      line-height: 1;
    }

    @media (max-width: 768px) {
      .navbar {
        display: block;
        background: rgba(232, 235, 238, 0.82);
      }

      .navbar-container {
        min-height: 78px;
        padding: 8px 14px;
        flex-wrap: nowrap;
      }

      .navbar-brand img {
        width: 129px;
        width: min(129px, 33vw);
        height: 73px;
        aspect-ratio: 16 / 9;
        height: auto;
        object-fit: contain;
      }

      .navbar-toggle {
        display: inline-flex;
        width: 40px;
        height: 40px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 10px 22px rgba(47, 72, 95, 0.08);
      }

      .navbar-links {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 14px;
        right: 14px;
        z-index: 1001;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 0;
        padding: 10px;
        border: 1px solid rgba(174, 184, 194, 0.5);
        border-radius: 22px;
        background: #fbfcfd;
        box-shadow: 0 22px 46px rgba(35, 37, 40, 0.14);
      }

      .navbar.is-open .navbar-links {
        display: grid;
      }

      .navbar-links a {
        display: flex;
        align-items: center;
        min-height: 44px;
        margin-left: 0;
        padding: 10px 12px;
        border: 1px solid #e5ebf1;
        border-radius: 14px;
        background: #f6f8fa;
        color: #3f5062;
        font-size: 14px;
        font-weight: 650;
        line-height: 1.2;
      }

      .navbar-links a:hover {
        background: #eef4fb;
        color: var(--link);
      }

      .navbar-links a[href$="#gallery"] {
        display: none;
      }
    }

    .page-shell {
      width: 100%;
      max-width: 1100px;
      width: min(1100px, 100%);
      min-height: calc(100vh - 102px);
      margin: 0 auto;
      padding: 42px 2.5% 24px;
      padding: clamp(28px, 5vw, 54px) 2.5% 24px;
      display: grid;
      justify-items: center;
      align-items: center;
    }

    .not-found-layout {
      display: grid;
      justify-items: center;
      align-content: center;
      width: 100%;
      max-width: 520px;
      width: min(100%, 520px);
      gap: 22px;
    }

    .card-stage {
      width: 100%;
      max-width: 410px;
      width: min(100%, 410px);
      margin: 0 auto;
      perspective: 1300px;
      perspective-origin: 50% 45%;
    }

    .holo-card {
      position: relative;
      width: 336px;
      width: min(76vw, 336px);
      height: 470px;
      aspect-ratio: 5 / 7;
      margin: 0 auto;
      border-radius: 28px;
      transform-style: preserve-3d;
      transform: rotateX(var(--rx)) rotateY(var(--ry));
      filter:
        drop-shadow(0 34px 40px rgba(41, 64, 91, 0.22))
        drop-shadow(0 4px 0 rgba(255, 255, 255, 0.72));
      transition: filter 0.24s ease;
      will-change: transform;
    }

    .holo-card::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: inherit;
      background:
        conic-gradient(from 138deg, #7aa8ff, #f08bd7, #f8d66a, #71dec7, #a6a2ff, #7aa8ff);
      transform: translateZ(-12px);
      box-shadow:
        0 20px 42px rgba(52, 69, 86, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.68);
    }

    .holo-card::after {
      content: "";
      position: absolute;
      inset: 2.2%;
      z-index: 8;
      pointer-events: none;
      border-radius: 24px;
      background:
        radial-gradient(circle at var(--glare-x) var(--glare-y), rgba(255, 255, 255, calc(0.34 + var(--energy) * 0.32)), transparent 25%),
        linear-gradient(118deg, transparent 0 21%, rgba(255, 255, 255, calc(0.18 + var(--energy) * 0.24)) 33%, rgba(122, 217, 255, 0.18) 42%, transparent 55%),
        linear-gradient(64deg, transparent 0 46%, rgba(255, 210, 119, 0.24) 52%, rgba(255, 255, 255, 0.18) 56%, transparent 64%),
        repeating-linear-gradient(101deg, rgba(255, 255, 255, 0.13) 0 1px, rgba(88, 105, 126, 0.035) 1px 3px, transparent 3px 7px);
      mix-blend-mode: screen;
      opacity: 0.95;
      transform: translateZ(28px);
      animation: foilSweep 7.2s ease-in-out infinite;
    }

    .card-face {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: inherit;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 255, 255, 0.94), transparent 26%),
        radial-gradient(circle at 78% 70%, rgba(255, 217, 117, 0.42), transparent 31%),
        conic-gradient(from 212deg at 52% 46%, rgba(116, 159, 255, 0.46), rgba(255, 139, 212, 0.38), rgba(255, 220, 107, 0.45), rgba(105, 219, 197, 0.4), rgba(116, 159, 255, 0.46)),
        linear-gradient(145deg, rgba(253, 254, 254, 0.98), rgba(226, 235, 243, 0.94) 48%, rgba(248, 242, 232, 0.98));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        inset 0 -30px 52px rgba(60, 82, 109, 0.12),
        inset 0 0 0 7px rgba(255, 255, 255, 0.22),
        0 0 0 1px rgba(255, 255, 255, 0.82);
      transform-style: preserve-3d;
    }

    .card-face::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(61deg, rgba(177, 189, 201, 0.05), rgba(255, 255, 255, 0.5) 34%, rgba(255, 200, 118, 0.14) 52%, rgba(119, 224, 255, 0.18) 70%, transparent),
        repeating-linear-gradient(22deg, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px 9px),
        repeating-linear-gradient(90deg, rgba(50, 67, 83, 0.024) 0 1px, transparent 1px 5px);
      opacity: 0.98;
      transform: translateZ(5px);
    }

    .card-face::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(72deg, transparent 16%, rgba(255, 255, 255, 0.54) 38%, rgba(122, 217, 255, 0.22) 46%, transparent 63%),
        repeating-linear-gradient(132deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 13px);
      opacity: 0.58;
      transform: translate3d(calc(var(--mx) * -10px), calc(var(--my) * -6px), 22px);
      animation: foilSweep 7.8s ease-in-out infinite reverse;
    }

    .card-border {
      position: absolute;
      inset: 18px;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.46);
      border-radius: 19px;
      box-shadow:
        inset 0 0 0 1px rgba(73, 90, 110, 0.14),
        inset 0 0 34px rgba(255, 255, 255, 0.28);
      transform: translateZ(18px);
    }

    .card-border::before,
    .card-border::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 52%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), rgba(80, 99, 120, 0.22), transparent);
      transform: translateX(-50%);
    }

    .card-border::before {
      top: 22%;
    }

    .card-border::after {
      bottom: 22%;
    }

    .corner-mark {
      position: absolute;
      z-index: 5;
      display: grid;
      gap: 2px;
      place-items: center;
      min-width: 44px;
      color: rgba(38, 53, 69, 0.82);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.74);
      transform: translateZ(31px);
    }

    .corner-mark::after {
      content: "";
      width: 11px;
      height: 11px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      transform: rotate(45deg);
      background: rgba(255, 255, 255, 0.3);
    }

    .corner-mark.top {
      top: 27px;
      left: 23px;
    }

    .corner-mark.bottom {
      right: 23px;
      bottom: 27px;
      transform: translateZ(31px) rotate(180deg);
    }

    .card-diamond {
      position: absolute;
      inset: 50% auto auto 50%;
      z-index: 2;
      width: 52%;
      height: 52%;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.32);
      transform: translate3d(calc(-50% + var(--mx) * -7px), calc(-50% + var(--my) * -6px), 14px) rotate(45deg);
      background:
        conic-gradient(from 45deg, rgba(255, 255, 255, 0.24), rgba(119, 177, 255, 0.16), rgba(255, 173, 223, 0.16), rgba(255, 229, 137, 0.18), rgba(255, 255, 255, 0.24));
    }

    .card-number {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      color: rgba(31, 45, 61, 0.92);
      font-size: 118px;
      font-size: clamp(88px, 11vw, 132px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
      transform: translate3d(calc(var(--mx) * 4px), calc(var(--my) * 3px), 42px);
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9),
        0 0 20px rgba(255, 255, 255, 0.4),
        0 16px 28px rgba(47, 62, 77, 0.16);
    }

    .card-number::before,
    .card-number::after {
      content: "404";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: calc(0.08 + var(--energy) * 0.06);
      color: rgba(73, 88, 103, 0.7);
    }

    .card-number::before {
      transform: translate(calc(var(--mx) * -3px - 1px), calc(var(--my) * 2px));
    }

    .card-number::after {
      transform: translate(calc(var(--mx) * 2px + 1px), calc(var(--my) * -2px));
      color: rgba(170, 139, 103, 0.42);
    }

    .card-caption {
      position: absolute;
      left: 50%;
      bottom: 19%;
      z-index: 4;
      width: 42%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.56), transparent);
      transform: translate3d(calc(-50% + var(--mx) * -3px), calc(var(--my) * -2px), 24px);
    }

    @keyframes foilSweep {
      0%, 100% {
        transform: translate3d(calc(var(--mx) * -10px - 38%), calc(var(--my) * -6px), 22px);
        opacity: 0.2;
      }
      45%, 58% {
        opacity: 0.72;
      }
      72% {
        transform: translate3d(calc(var(--mx) * -10px + 38%), calc(var(--my) * -6px), 22px);
        opacity: 0.28;
      }
    }

    @media (max-width: 860px) {
      body {
        font-size: 14.5px;
        line-height: 1.64;
      }

      .page-shell {
        min-height: calc(100vh - 78px);
        padding: 34px 14px 24px;
      }

      .not-found-layout {
        gap: 24px;
      }

      .holo-card {
        width: 314px;
        width: min(70vw, 314px);
        border-radius: 24px;
      }
    }

    @media (max-width: 480px) {
      .page-shell {
        padding: 28px 10px 22px;
      }

      .holo-card {
        width: 266px;
        width: min(82vw, 266px);
      }

      .card-border {
        inset: 15px;
        border-radius: 17px;
      }

      .corner-mark {
        font-size: 16px;
        min-width: 38px;
      }

      .corner-mark.top {
        top: 23px;
        left: 18px;
      }

      .corner-mark.bottom {
        right: 18px;
        bottom: 23px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }

      .holo-card,
      .card-number,
      .card-diamond,
      .card-caption,
      .card-face::after,
      .holo-card::after {
        transform: none !important;
      }

      .holo-card::after {
        opacity: 0.58;
      }
    }
  </style>
</head>

  <script src="script/site-core.js"></script>
  <script>
    (function () {
      "use strict";

      var Site = window.Site;
      var root = document.documentElement;
      var targetX = 0;
      var targetY = 0;
      var currentX = 0;
      var currentY = 0;
      var rafId = null;

      function writeCardVars(x, y) {
        var energy = Math.min(1, Math.sqrt(x * x + y * y));
        root.style.setProperty("--mx", x.toFixed(4));
        root.style.setProperty("--my", y.toFixed(4));
        root.style.setProperty("--rx", (-y * 7).toFixed(3) + "deg");
        root.style.setProperty("--ry", (x * 9).toFixed(3) + "deg");
        root.style.setProperty("--glare-x", ((x * 0.42 + 0.5) * 100).toFixed(2) + "%");
        root.style.setProperty("--glare-y", ((y * 0.36 + 0.46) * 100).toFixed(2) + "%");
        root.style.setProperty("--energy", energy.toFixed(4));
      }

      function animateCard() {
        currentX += (targetX - currentX) * 0.075;
        currentY += (targetY - currentY) * 0.075;
        writeCardVars(currentX, currentY);
        rafId = Site.requestFrame(animateCard);
      }

      function initCardMotion() {
        if (!Site || Site.prefersReducedMotion()) {
          writeCardVars(0, 0);
          return;
        }

        function updateTarget(event) {
          if (event.pointerType && event.pointerType !== "mouse" && event.pointerType !== "pen") return;
          targetX = (event.clientX / window.innerWidth - 0.5) * 2;
          targetY = (event.clientY / window.innerHeight - 0.5) * 2;
        }

        window.addEventListener("pointermove", updateTarget, { passive: true });
        window.addEventListener("mousemove", updateTarget, { passive: true });

        window.addEventListener("pointerleave", function () {
          targetX = 0;
          targetY = 0;
        });

        window.addEventListener("blur", function () {
          targetX = 0;
          targetY = 0;
        });

        rafId = Site.requestFrame(animateCard);
      }

      function onReducedMotionChange() {
        if (Site.prefersReducedMotion()) {
          if (rafId !== null) Site.cancelFrame(rafId);
          rafId = null;
          targetX = 0;
          targetY = 0;
          currentX = 0;
          currentY = 0;
          writeCardVars(0, 0);
        } else if (rafId === null) {
          rafId = Site.requestFrame(animateCard);
        }
      }

      if (!Site) return;

      Site.initLogoFallback();
      Site.initMobileNavbar();

      if (window.matchMedia) {
        var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
        if (typeof reducedMotion.addEventListener === "function") {
