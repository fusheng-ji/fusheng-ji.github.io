<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Pool</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #f7fafc 0%, #eef3f7 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; }
    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
      line-height: 1.45;
      max-width: 420px;
      color: #12202c;
      font-size: 13px;
    }
    .hud h1 {
      margin: 0 0 6px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Duck Pool</h1>
    <div>CPU height-field drives the water surface and caustics. Click the water to spawn floating rubber ducks that collide with each other.</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
